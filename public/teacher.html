<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הגדרות משחק - גלגל המזל</title>
    <link rel="stylesheet" href="teacher.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button">חזרה לרשימת המשחקים</a>
        <h1>הגדרת גלגל המזל</h1>
        <p>בעמוד זה ניתן להגדיר את המושגים והשאלות שיופיעו במשחק. הנתונים נשמרים באופן אוטומטי בדפדפן.</p>

        <div id="topics-container">
            <h2>מושגים ושאלות</h2>
            <!-- Topics will be added here dynamically -->
        </div>

        <button id="add-topic-btn" class="btn">הוסף מושג חדש</button>
        <button id="save-btn" class="btn primary">שמור נתונים</button>
        <p id="save-feedback" class="feedback"></p>
    </div>

    <script src="teacher.js"></script>
</body>
</html>
