<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אזור המורה</title>
  <link rel="stylesheet" href="teacher.css">
</head>
<body>
  <a href="index.html" class="back-button">חזרה לדף הראשי</a>
  <h1>אזור המורה - ניהול תוכן המשחק</h1>
  <div id="topics-container">
    <h2>מושגים</h2>
    <ul id="topics-list"></ul>
    <input type="text" id="new-topic-input" placeholder="הוסף מושג חדש">
    <button id="add-topic-btn">הוסף מושג</button>
  </div>
  <div id="quizzes-container">
    <h2>שאלות</h2>
    <select id="quiz-topic-select"></select>
    <div id="quiz-editor"></div>
    <button id="save-changes-btn">שמור שינויים</button>
  </div>
  <script src="teacher.js"></script>
</body>
</html>
