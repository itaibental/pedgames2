<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>גלגל המזל</title>
  <link rel="stylesheet" href="wheel.css">
</head>
<body>
  <a href="games.html" class="back-button">חזרה לרשימת המשחקים</a>
  <h1>גלגל המזל</h1>
  <div id="wheel-container">
    <canvas id="wheel-canvas"></canvas>
    <button id="spin-btn">סובב</button>
  </div>
  <div id="question-modal" class="hidden">
    <div id="question-content">
      <h2 id="question-topic"></h2>
      <p id="question-text"></p>
      <div id="options-container"></div>
      <button id="submit-answer-btn">שלח תשובה</button>
      <p id="feedback"></p>
    </div>
  </div>
  <script src="wheel.js"></script>
</body>
</html>
